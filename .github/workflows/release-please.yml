name: release-please

# Derives the next version + CHANGELOG entry from Conventional Commits on main.
# Opens/updates a "release PR"; merging it tags the release and updates CHANGELOG.md.
# No npm publish — release-type "simple" only versions version.txt + CHANGELOG.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
